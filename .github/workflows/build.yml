name: Build ESP32-S3 NAT Router with DNS Filter

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ── 1. 检出代码 ─────────────────────────────────────────
      - name: Checkout this repo
        uses: actions/checkout@v4

      # ── 2. 克隆上游 esp32_nat_router ─────────────────────────
      - name: Clone upstream esp32_nat_router
        run: |
          git clone --depth=1 https://github.com/martin-ger/esp32_nat_router.git upstream
          # 将我们的新文件覆盖/追加进去
          cp main/dns_filter.h    upstream/main/
          cp main/dns_filter.c    upstream/main/
          cp main/dns_server.c    upstream/main/dns_server.c
          cp main/http_server_dns_filter_handlers.c upstream/main/

      # ── 3. 修改 CMakeLists.txt，把新文件加入编译 ──────────────
      - name: Patch CMakeLists.txt
        working-directory: upstream
        run: |
          # 在 idf_component_register 的 SRCS 列表里追加新源文件
          sed -i 's/SRCS "/SRCS "main\/dns_filter.c" "main\/http_server_dns_filter_handlers.c" "/' main/CMakeLists.txt || true

          # 如果上面的 sed 失败（格式不同），用 Python 做追加
          python3 - <<'PYEOF'
          import re, pathlib
          p = pathlib.Path('main/CMakeLists.txt')
          txt = p.read_text()
          if 'dns_filter.c' not in txt:
              txt = txt.replace(
                  'idf_component_register(',
                  'idf_component_register(\n    SRCS "main/dns_filter.c" "main/http_server_dns_filter_handlers.c"'
              )
              p.write_text(txt)
              print("Patched CMakeLists.txt via Python")
          else:
              print("dns_filter.c already in CMakeLists")
          PYEOF

      # ── 4. 在 app_main.c / http_server.c 中插入调用 ──────────
      - name: Patch app_main.c to call dns_filter_init()
        working-directory: upstream
        run: |
          python3 - <<'PYEOF'
          import pathlib, re

          # ---- app_main.c: 加 include + dns_filter_init() 调用 ----
          p = pathlib.Path('main/app_main.c')
          if p.exists():
              txt = p.read_text()
              if 'dns_filter_init' not in txt:
                  txt = '#include "dns_filter.h"\n' + txt
                  # 在 app_main 函数体开始处（nvs_flash_init 之后）插入初始化
                  txt = re.sub(
                      r'(nvs_flash_init\s*\(\s*\)\s*;)',
                      r'\1\n    dns_filter_init();',
                      txt, count=1
                  )
                  p.write_text(txt)
                  print("Patched app_main.c")

          # ---- http_server.c: 注册 handler ----
          for fname in ['main/http_server.c', 'main/esp32_nat_router.c']:
              p = pathlib.Path(fname)
              if not p.exists():
                  continue
              txt = p.read_text()
              if 'register_dns_filter_handlers' in txt:
                  break
              # 在 httpd_start 调用后面追加 register_dns_filter_handlers
              txt = re.sub(
                  r'(httpd_start\s*\([^)]+\)\s*;)',
                  r'\1\n    register_dns_filter_handlers(server);',
                  txt, count=1
              )
              if '#include "http_server_dns_filter_handlers.c"' not in txt \
                 and 'register_dns_filter_handlers' in txt:
                  txt = '#include "dns_filter.h"\n' + txt
              p.write_text(txt)
              print(f"Patched {fname}")
              break
          PYEOF

      # ── 5. 配置 sdkconfig 支持 ESP32-S3 ──────────────────────
      - name: Patch sdkconfig for ESP32-S3
        working-directory: upstream
        run: |
          cat >> sdkconfig.defaults << 'EOF'
          CONFIG_IDF_TARGET="esp32s3"
          CONFIG_ESPTOOLPY_FLASHSIZE_4MB=y
          CONFIG_PARTITION_TABLE_TWO_OTA=n
          CONFIG_PARTITION_TABLE_SINGLE_APP=y
          EOF

      # ── 6. 设置 ESP-IDF 环境 ─────────────────────────────────
      - name: Setup ESP-IDF v5.2
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2.2
          target: esp32s3
          path: upstream
          command: idf.py build

      # ── 7. 收集 .bin 文件 ────────────────────────────────────
      - name: Collect firmware binaries
        run: |
          mkdir -p firmware
          find upstream/build -name "*.bin" -exec cp {} firmware/ \;
          find upstream/build -name "flasher_args.json" -exec cp {} firmware/ \;
          # 生成一键烧录脚本
          cat > firmware/flash.sh << 'FLASH'
          #!/bin/bash
          PORT=${1:-/dev/ttyUSB0}
          BAUD=921600
          echo "Flashing to $PORT ..."
          esptool.py --chip esp32s3 --port "$PORT" --baud "$BAUD" \
            --before default_reset --after hard_reset write_flash \
            -z --flash_mode dio --flash_freq 80m --flash_size 4MB \
            0x0     bootloader.bin \
            0x8000  partition-table.bin \
            0x10000 esp32_nat_router.bin
          FLASH
          chmod +x firmware/flash.sh

          cat > firmware/flash_windows.bat << 'FLASHBAT'
          @echo off
          set PORT=COM3
          set BAUD=921600
          esptool.exe --chip esp32s3 --port %PORT% --baud %BAUD% ^
            --before default_reset --after hard_reset write_flash ^
            -z --flash_mode dio --flash_freq 80m --flash_size 4MB ^
            0x0     bootloader.bin ^
            0x8000  partition-table.bin ^
            0x10000 esp32_nat_router.bin
          FLASHBAT

      # ── 8. 上传 Artifact ─────────────────────────────────────
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-nat-router-dns-filter-${{ github.sha }}
          path: firmware/
          retention-days: 30
