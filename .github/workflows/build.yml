name: Build ESP32-S3 NAT Router with DNS Filter

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone upstream esp32_nat_router
        run: |
          git clone --depth=1 https://github.com/martin-ger/esp32_nat_router.git upstream
          cp main/dns_filter.h                      upstream/main/
          cp main/dns_filter.c                      upstream/main/
          cp main/dns_server.c                      upstream/main/dns_server.c
          cp main/http_server_dns_filter_handlers.c upstream/main/

      - name: Patch all compatibility issues
        working-directory: upstream
        run: |
          python3 - <<'PYEOF'
          import pathlib, re

          # ── 1. 删掉 idf_component.yml 里的 targets 限制 ──────────
          for yml in pathlib.Path('.').rglob('idf_component.yml'):
              txt = yml.read_text()
              txt = re.sub(r'^\s*targets\s*:.*$', '', txt, flags=re.MULTILINE)
              txt = re.sub(r'targets:\s*\n(\s+-\s+\S+\s*\n)+', '', txt)
              yml.write_text(txt)
              print(f"Patched targets in {yml}")

          # ── 2. 替换整个 get_chip_model_name 函数 ─────────────────
          # 用一个兼容所有 ESP-IDF 版本的实现替换掉
          SAFE_FUNC = r"""static const char* get_chip_model_name(esp_chip_model_t model)
          {
              switch (model) {
          #ifdef CHIP_ESP32
                  case CHIP_ESP32:    return "ESP32";
          #endif
          #ifdef CHIP_ESP32S2
                  case CHIP_ESP32S2:  return "ESP32-S2";
          #endif
          #ifdef CHIP_ESP32S3
                  case CHIP_ESP32S3:  return "ESP32-S3";
          #endif
          #ifdef CHIP_ESP32C3
                  case CHIP_ESP32C3:  return "ESP32-C3";
          #endif
          #ifdef CHIP_ESP32C2
                  case CHIP_ESP32C2:  return "ESP32-C2";
          #endif
          #ifdef CHIP_ESP32C5
                  case CHIP_ESP32C5:  return "ESP32-C5";
          #endif
          #ifdef CHIP_ESP32C6
                  case CHIP_ESP32C6:  return "ESP32-C6";
          #endif
          #ifdef CHIP_ESP32H2
                  case CHIP_ESP32H2:  return "ESP32-H2";
          #endif
          #ifdef CHIP_ESP32P4
                  case CHIP_ESP32P4:  return "ESP32-P4";
          #endif
          #ifdef CHIP_ESP32C61
                  case CHIP_ESP32C61: return "ESP32-C61";
          #endif
          #ifdef CHIP_POSIX_LINUX
                  case CHIP_POSIX_LINUX: return "Linux";
          #endif
                  default:            return "Unknown";
              }
          }
          """

          for f in pathlib.Path('.').rglob('cmd_system.c'):
              txt = f.read_text()
              # 用正则匹配整个函数并替换
              new_txt = re.sub(
                  r'static const char\*\s+get_chip_model_name\s*\([^)]*\)\s*\{[^}]*(?:\{[^}]*\}[^}]*)?\}',
                  SAFE_FUNC,
                  txt,
                  flags=re.DOTALL
              )
              if new_txt != txt:
                  f.write_text(new_txt)
                  print(f"Replaced get_chip_model_name in {f}")
              else:
                  # 备用方案：直接在函数里加 default case
                  new_txt = re.sub(
                      r'(switch\s*\(\s*model\s*\)\s*\{)(.*?)(^\s*\})',
                      lambda m: m.group(1) + m.group(2) + '        default: return "Unknown";\n    }',
                      txt,
                      flags=re.DOTALL | re.MULTILINE
                  )
                  f.write_text(new_txt)
                  print(f"Added default case in {f}")

          # ── 3. CMakeLists.txt 加入新文件 ──────────────────────────
          p = pathlib.Path('main/CMakeLists.txt')
          txt = p.read_text()
          if 'dns_filter.c' not in txt:
              txt = re.sub(
                  r'(idf_component_register\(SRCS\s+")',
                  r'\1dns_filter.c"\n                             "http_server_dns_filter_handlers.c"\n                             "',
                  txt, count=1
              )
              p.write_text(txt)
              print("Patched CMakeLists.txt")

          # ── 4. app_main.c ─────────────────────────────────────────
          p = pathlib.Path('main/app_main.c')
          if p.exists():
              txt = p.read_text()
              if 'dns_filter_init' not in txt:
                  txt = '#include "dns_filter.h"\n' + txt
                  txt = re.sub(
                      r'(nvs_flash_init\s*\(\s*\)\s*;)',
                      r'\1\n    dns_filter_init();',
                      txt, count=1
                  )
                  p.write_text(txt)
                  print("Patched app_main.c")

          # ── 5. http_server.c ──────────────────────────────────────
          for fname in ['main/http_server.c', 'main/esp32_nat_router.c']:
              p = pathlib.Path(fname)
              if not p.exists():
                  continue
              txt = p.read_text()
              if 'register_dns_filter_handlers' in txt or 'httpd_start' not in txt:
                  continue
              txt = '#include "dns_filter.h"\n' + txt
              txt = re.sub(
                  r'(httpd_start\s*\([^)]+\)\s*;)',
                  r'\1\n    register_dns_filter_handlers(server);',
                  txt, count=1
              )
              p.write_text(txt)
              print(f"Patched {fname}")
              break

          PYEOF

      - name: Patch sdkconfig.defaults
        working-directory: upstream
        run: |
          grep -v 'CONFIG_IDF_TARGET\|CONFIG_ESPTOOLPY_FLASH' sdkconfig.defaults > tmp || true
          mv tmp sdkconfig.defaults
          printf '\nCONFIG_IDF_TARGET="esp32s3"\nCONFIG_ESPTOOLPY_FLASHSIZE_4MB=y\n' >> sdkconfig.defaults

      - name: Build with ESP-IDF v5.3
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.2
          target: esp32s3
          path: upstream
          command: idf.py build

      - name: Collect firmware binaries
        run: |
          mkdir -p firmware
          find upstream/build -name "*.bin"             -exec cp {} firmware/ \; 2>/dev/null || true
          find upstream/build -name "flasher_args.json" -exec cp {} firmware/ \; 2>/dev/null || true

          cat > firmware/flash.sh << 'FLASH'
          #!/bin/bash
          PORT=${1:-/dev/ttyUSB0}
          echo "Flashing to $PORT ..."
          esptool.py --chip esp32s3 --port "$PORT" --baud 921600 \
            --before default_reset --after hard_reset write_flash \
            -z --flash_mode dio --flash_freq 80m --flash_size 4MB \
            0x0     bootloader.bin \
            0x8000  partition-table.bin \
            0x10000 esp32_nat_router.bin
          FLASH
          chmod +x firmware/flash.sh

          cat > firmware/flash_windows.bat << 'BAT'
          @echo off
          set PORT=COM3
          esptool.exe --chip esp32s3 --port %PORT% --baud 921600 ^
            --before default_reset --after hard_reset write_flash ^
            -z --flash_mode dio --flash_freq 80m --flash_size 4MB ^
            0x0     bootloader.bin ^
            0x8000  partition-table.bin ^
            0x10000 esp32_nat_router.bin
          BAT
          ls -lh firmware/

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-nat-router-dns-filter-${{ github.sha }}
          path: firmware/
          retention-days: 30
